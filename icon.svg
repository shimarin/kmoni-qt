<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle center line -->
  <line x1="20" y1="128" x2="236" y2="128" stroke="#ffffff0d" stroke-width="1"/>

  <!-- Left flat + small noise (blue) -->
  <polyline
    points="20,128 76,128 84,119 92,137 100,128 108,128"
    fill="none" stroke="#4a9eff" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central spike: P波→S波 (red/orange) -->
  <polyline
    points="108,128 116,28 124,228 132,70 140,186 148,112 156,144 164,128"
    fill="none" stroke="#ff4500" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right decay + flat (blue) -->
  <polyline
    points="164,128 172,118 180,138 188,128 236,128"
    fill="none" stroke="#4a9eff" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
